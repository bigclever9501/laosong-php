				stroke-miterlimit: 3.9991;
			}
			.flex {
				display: flex;
				align-items: center;
			}

			view {
				display: block;
			}

			.vessel {
				justify-content: space-between;
				border-bottom: 0.5px solid rgb(238,
						238, 238);
				padding: 5px;
			}

			div {
				display: block;
			}

			.detail {
				top: 5px;
				position:
					relative;
				box-sizing: border-box;
			}

			.detail>img {
				width: 100%;
			}

			.divtable {
				/* border: solid #cccccc 1px; border-radius: 10px; */
				position: relative;
				box-sizing: border-box;
				margin: 20px auto;
				display: block;
			}

			.card {
				border:
					solid #cccccc 1px;
				border-radius: 15px;
				background-color: #fff;
				display:
					block;
			}

			.row {
				position: relative;
				box-sizing: border-box;
				margin-left:
					-4px;
				margin-right: -4px;
			}

			.col {
				width: 50%;
				float: left;
				box-sizing:
					border-box;
				padding-left: 2px;
				padding-right: 2px;
				margin-bottom: 5px;
			}

			.namediv {
				display: flex;
				justify-content: flex-start;
				margin-bottom:
					5px;
			}

			.name {
				font-weight: bold;
			}

			.cardtitle {
				margin-left: 10px;
				font-weight:
					bold;
				height: 23px;
			}

			.subtitle {
				margin-left: 10px;
				color: #707070;
				font-size:
					3.5vw;
				height: 23px;
			}

			.cardContent {
				padding: 2px;
			}

			.frame {
				fill: white;
				stroke: #CCCDD1;
				stroke-width: 5;
			}

			@media screen and (max-width: 355px) {
				.qrcode {
					width: 109px;
					height: 110px;
				}
			}

			@media screen and (min-width: 355px) {
				.qrcode {
					width: 165px;
					height: 168px;
				}
			}
